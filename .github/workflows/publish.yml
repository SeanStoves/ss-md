# Publish to npm when a GitHub Release is published — via OIDC Trusted Publishing.
# No npm token anywhere: the workflow gets short-lived credentials at run time and npm
# attaches signed provenance automatically. Nothing to leak.
#
# One-time setup (run once, after `npm login` locally):
#   npm trust github @seanstoves/ss-md --file publish.yml --repo SeanStoves/ss-md
# (or set it on npmjs.com: package Settings -> Trusted Publisher -> GitHub Actions ->
#  org SeanStoves, repo ss-md, workflow publish.yml).
#
# To release: bump "version" in package.json, commit, then cut a GitHub Release with a
# matching tag (e.g. v0.1.0). Tests run as a gate, then it publishes.
name: publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC: lets npm mint a short-lived credential + sign provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm test
      - run: npm publish --access public # OIDC trusted publishing — no token, provenance automatic
